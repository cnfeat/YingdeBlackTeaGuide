<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>营造社</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #FFFAFA;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center;
}
.container { padding: 40px 20px; max-width: 500px; }
h1 { font-size: 28px; color: #C90314; margin-bottom: 12px; }
.sub { font-size: 16px; color: #8B7355; margin-bottom: 32px; }
.links { display: flex; flex-direction: column; gap: 12px; }
.link-card {
  display: block; padding: 16px 24px;
  background: #fff; border: 1px solid #F0E0E0;
  border-radius: 10px; text-decoration: none;
  color: #3D2B1F; font-size: 16px; font-weight: 600;
  transition: all 0.2s;
}
.link-card:hover { border-color: #C90314; box-shadow: 0 2px 8px rgba(201,3,20,0.1); }
.link-card small { display: block; font-weight: 400; color: #8B7355; font-size: 13px; margin-top: 4px; }
.footer { margin-top: 40px; font-size: 12px; color: #B8A088; }
</style>
</head>
<body>
<div class="container">
  <h1>营造社</h1>
  <p class="sub">慢慢来，比较快</p>
  <div class="links">
    <a href="/tea/" class="link-card">
      🍵 英德红茶购买攻略
      <small>本地人带路，买茶不踩坑</small>
    </a>
  </div>
  <p class="footer">yingzaoshe.cn</p>
</div>
</body>
</html>
